<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click the Bug Game</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Click the Bug Game</h1>

  <p class="instructions">
Click the emoji as many times as you can before the timer reaches zero.
Press Start Game to begin.
</p>

<div id="score">Score: 0</div>
<div id="time">Time: 30</div>

<button id="startBtn" class="btn btn-primary" onclick="startGame()">Start Game</button>

<div id="gameArea" class="box">
<div id="bug">😒</div>
</div>
<script>

const gameSettings = {
"timeLimit":30,
"points":1
};

let bug=document.getElementById("bug");
let gameArea=document.getElementById("gameArea");
let scoreDisplay=document.getElementById("score");
let timeDisplay=document.getElementById("time");
let score=0;
let timeLeft=gameSettings.timeLimit;
let timer;
let gameRunning=false;

function moveBug(){
let maxX=gameArea.clientWidth-bug.clientWidth;
let maxY=gameArea.clientHeight-bug.clientHeight;
let randomX=Math.floor(Math.random()*maxX);
let randomY=Math.floor(Math.random()*maxY);
bug.style.left=randomX+"px";
bug.style.top=randomY+"px";
}

bug.addEventListener("click",function(){

if(!gameRunning){
return;
}
score=score+gameSettings.points;
scoreDisplay.textContent="Score: "+score;

moveBug();
});

function startGame(){
clearInterval(timer);
score=0;
timeLeft=gameSettings.timeLimit;
gameRunning=true;
scoreDisplay.textContent="Score: "+score;
timeDisplay.textContent="Time: "+timeLeft;
moveBug();
timer=setInterval(function(){
timeLeft=timeLeft-1;
timeDisplay.textContent="Time: "+timeLeft;
if(timeLeft===0){
clearInterval(timer);
gameRunning=false;
alert("Game over! Your score is "+score);

}

},1000);

}

</script>

</body>
</html>
